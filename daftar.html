<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar Ahli PAK</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;max-width:700px;margin:auto;padding:20px}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;box-sizing:border-box}
button{background:#0088cc;color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<h2>Daftar Ahli PAK</h2>
<input id="nama" placeholder="Nama Penuh">
<input id="no_ic" placeholder="No. Kad Pengenalan">
<input id="telefon" placeholder="No. Telefon">
<input id="email" type="email" placeholder="Email">
<select id="jantina"><option>Lelaki</option><option>Perempuan</option></select>
<select id="bangsa"><option>Melayu</option><option>Cina</option><option>India</option><option>Lain-lain</option></select>
<select id="agama"><option>Islam</option><option>Kristian</option><option>Hindu</option><option>Buddha</option><option>Lain-lain</option></select>
<input id="majlis" placeholder="Majlis/Jawatan">
<input id="alamat" placeholder="Alamat">
<input id="ayh" placeholder="Nama Ayah">
<input id="abg" placeholder="Nama Abang">
<input id="nama_waris" placeholder="Nama Waris">
<input id="telefon_waris" placeholder="Telefon Waris">
<button onclick="daftarAhli()">Hantar Permohonan</button>
<script>
Telegram.WebApp.ready(); Telegram.WebApp.expand();
async function daftarAhli(){
 const telegram_id=(Telegram.WebApp.initDataUnsafe.user?.id||"").toString();
 const {error}=await supabase.from("members").insert([{
  nama:nama.value,no_ic:no_ic.value,telefon:telefon.value,email:email.value,
  jantina:jantina.value,bangsa:bangsa.value,agama:agama.value,
  majlis:majlis.value,alamat:alamat.value,ayh:ayh.value,abg:abg.value,
  nama_waris:nama_waris.value,telefon_waris:telefon_waris.value,
  telegram_id:telegram_id,status:"Menunggu"
 }]);
 if(error){alert("Ralat: "+error.message);console.error(error);}
 else{alert("Permohonan berjaya dihantar.");}
}
</script>
</body></html>
