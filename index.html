<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertubuhan Aktivis Keusahawanan</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            background: #0088cc;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="box">

<h2>🤝 Pertubuhan Aktivis Keusahawanan</h2>

<p>
Selamat datang ke Mini App rasmi pertubuhan.
</p>

<button onclick="daftarAhli()">
📝 Daftar Ahli
</button>

<button onclick="semakStatus()">
🔎 Semak Status Ahli
</button>

<button onclick="pengumuman()">
📢 Pengumuman
</button>

<button onclick="maklumat()">
ℹ️ Tentang Pertubuhan
</button>

<button onclick="hubungiAdmin()">
📞 Hubungi Admin
</button>

</div>


<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();


function daftarAhli() {
    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.openLink(
            "https://docs.google.com/forms/d/e/1FAIpQLSfWIVNDCtVXQ33tChiVPfiF-XcKJpNUUzN8M700CdXpDUqjgQ/viewform"
        );
    } else {
        window.location.href =
            "https://docs.google.com/forms/d/e/1FAIpQLSfWIVNDCtVXQ33tChiVPfiF-XcKJpNUUzN8M700CdXpDUqjgQ/viewform";
    }
}



function maklumat(){

    alert(
    "Pertubuhan Aktivis Keusahawanan\n\nMembina komuniti usahawan dan aktivis."
    );

}

function semakStatus(){

    alert(
    "Fungsi semakan ahli akan dibangunkan."
    );

}


function pengumuman(){

    alert(
    "Tiada pengumuman terkini."
    );

}


function hubungiAdmin(){

    alert(
    "Hubungi admin melalui Telegram."
    );

}
    
</script>


</body>
</html>
